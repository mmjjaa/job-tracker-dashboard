<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>공고 텍스트 추출기 — 북마클릿 설치</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 40px; max-width: 560px; width: 100%; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .step { display: flex; gap: 16px; margin-bottom: 20px; align-items: flex-start; }
    .step-num { background: #4f46e5; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 14px; line-height: 1.6; }
    .step-text strong { color: #1e293b; }
    .bookmarklet-wrap { background: #f1f5f9; border-radius: 12px; padding: 20px; text-align: center; margin: 24px 0; }
    .bookmarklet-wrap p { margin-bottom: 12px; font-size: 13px; }
    .btn { display: inline-block; background: #4f46e5; color: white; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: grab; border: 3px dashed #818cf8; }
    .btn:hover { background: #4338ca; }
    .note { background: #fef3c7; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #92400e; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📋 공고 텍스트 추출기</h1>
    <p>취업사이트에서 복사가 안 될 때 클릭 한 번으로 공고 전체 텍스트를 추출합니다.</p>

    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">브라우저 북마크바를 표시합니다.<br><strong>Ctrl+Shift+B</strong> (Windows) / <strong>Cmd+Shift+B</strong> (Mac)</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">아래 버튼을 <strong>북마크바로 드래그</strong>해서 등록합니다.</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">채용 공고 페이지에서 북마클릿을 <strong>클릭</strong>하면 팝업이 뜹니다.</div>
    </div>

    <div class="bookmarklet-wrap">
      <p>아래 버튼을 북마크바로 드래그하세요</p>
      <a class="btn" id="bookmarklet">📋 공고 추출</a>
      <div class="note" style="margin-top:12px">드래그가 안 되면: 북마크 추가 → URL란에 아래 코드를 붙여넣기</div>
    </div>

    <details style="margin-top:16px">
      <summary style="cursor:pointer; font-size:13px; color:#64748b;">직접 코드 복사하기</summary>
      <textarea id="code" style="width:100%;height:120px;margin-top:8px;font-size:11px;border:1px solid #e2e8f0;border-radius:8px;padding:8px;resize:none;" readonly></textarea>
    </details>
  </div>

  <script>
    const code = `javascript:(function(){document.querySelectorAll('*').forEach(function(e){e.style.userSelect='text';e.style.webkitUserSelect='text';});var s=['.JobDescription','[class*="JobDescription"]','.jobs-description__content','#jobDetailContainer','.job-detail-content','#job-description-wrap','.job-detail-info','main article','main','article'];var t='';for(var i=0;i<s.length;i++){var el=document.querySelector(s[i]);if(el&&el.innerText&&el.innerText.trim().length>200){t=el.innerText.trim();break;}}if(!t)t=document.body.innerText;var ov=document.createElement('div');ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:2147483647;display:flex;align-items:center;justify-content:center;';var bx=document.createElement('div');bx.style.cssText='background:#fff;border-radius:12px;padding:24px;width:85%;max-width:640px;max-height:85vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);';var ti=document.createElement('div');ti.style.cssText='font-weight:700;font-size:15px;color:#1e293b;';ti.textContent='공고 텍스트 추출 완료 — 전체 복사 후 대시보드에 붙여넣기';var ta=document.createElement('textarea');ta.style.cssText='width:100%;height:280px;font-size:12px;border:1px solid #e2e8f0;border-radius:8px;padding:10px;resize:none;font-family:monospace;line-height:1.5;';ta.value=t;var br=document.createElement('div');br.style.cssText='display:flex;gap:8px;justify-content:flex-end;';var cb=document.createElement('button');cb.style.cssText='background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;font-size:14px;font-weight:600;';cb.textContent='전체 복사';cb.onclick=function(){navigator.clipboard.writeText(t).then(function(){cb.textContent='✅ 복사 완료';setTimeout(function(){cb.textContent='전체 복사';},2000);});};var cl=document.createElement('button');cl.style.cssText='background:#f1f5f9;color:#475569;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;font-size:14px;';cl.textContent='닫기';cl.onclick=function(){document.body.removeChild(ov);};br.appendChild(cb);br.appendChild(cl);bx.appendChild(ti);bx.appendChild(ta);bx.appendChild(br);ov.appendChild(bx);ov.onclick=function(e){if(e.target===ov)document.body.removeChild(ov);};document.body.appendChild(ov);ta.select();})();`

    document.getElementById('bookmarklet').href = code
    document.getElementById('code').value = code
  </script>
</body>
</html>
```
